<!-- assets/rod-carbon.svg
  Matte carbon fishing rod asset for K-Labs Studio Build 008.
  - Inline-friendly SVG. Designed to be inserted into the Layout screen.
  - Provides: a tapered rod blank path, a carbon-weave pattern, matte gradient, and an LED marker <use>-able symbol (id="ledMarker").
  - Usage: embed this file inline inside the page (preferred) or reference as <img> / background-image.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 240" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <defs>
    <!-- subtle woven carbon pattern -->
    <pattern id="carbonWeave" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <rect width="12" height="12" fill="#0b0b0b" />
      <path d="M0 6h12 M6 0v12" stroke="#0f0f10" stroke-width="1" opacity="0.12"/>
      <path d="M0 3h12 M3 0v12" stroke="#0a0a0a" stroke-width="0.6" opacity="0.14"/>
    </pattern>

    <!-- subtle coarse noise for depth -->
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency="0.8" numOctaves="2" seed="2" type="fractalNoise" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay" />
    </filter>

    <!-- matte gradient & sheen -->
    <linearGradient id="matteGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0b0b0b" stop-opacity="1" />
      <stop offset="0.5" stop-color="#0f0f10" stop-opacity="1" />
      <stop offset="1" stop-color="#070707" stop-opacity="1" />
    </linearGradient>

    <!-- narrow bright sheen for subtle automotive feel -->
    <linearGradient id="sheen" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0" />
      <stop offset="0.45" stop-color="#1a1a1a" stop-opacity="0.06" />
      <stop offset="0.5" stop-color="#2a2a2a" stop-opacity="0.12" />
      <stop offset="0.55" stop-color="#1a1a1a" stop-opacity="0.06" />
      <stop offset="1" stop-color="#000" stop-opacity="0" />
    </linearGradient>

    <!-- LED marker symbol (K-Labs red, soft glow) -->
    <radialGradient id="ledCore" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff3b3b" stop-opacity="1" />
      <stop offset="50%" stop-color="#ff2a2a" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0.9" />
    </radialGradient>
    <filter id="ledGlow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <g id="ledMarker">
      <circle r="8" cx="0" cy="0" fill="url(#ledCore)" />
      <circle r="18" cx="0" cy="0" fill="#ff3b3b" opacity="0.07" />
    </g>

    <!-- drop shadow for subtle depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35" />
    </filter>

  </defs>

  <!-- Background rectangle for debugging / visual reference (hidden by default) -->
  <rect width="100%" height="100%" fill="transparent" />

  <!-- Rod group: path + fill + sheen -->
  <g id="rodGroup" transform="translate(0,40)">
    <!-- define the tapered rod as a stroked path with variable stroke-width via a stroked path converted to shape using a stroke-linecap round; for precise fill we use a centered path and overlay a tapered shape via stroke-width -->
    <!-- The main rod path -- a long gentle curve that tapers from left (butt) to right (tip) -->
    <path id="rodPath" d="M60 160 C 300 120, 700 40, 1540 20" fill="none" stroke="url(#matteGradient)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="1" />

    <!-- overlay carbon weave clipped to the rod shape for texture -->
    <path id="rodMaskPath" d="M60 160 C 300 120, 700 40, 1540 20" fill="none" stroke="black" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

    <g id="rodTexture" style="filter:url(#grain)">
      <use href="#rodMaskPath" stroke="url(#carbonWeave)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
      <use href="#rodMaskPath" stroke="url(#sheen)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    </g>

    <!-- subtle highlight strip for luxury sheen -->
    <path d="M60 160 C 300 120, 700 40, 1540 20" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

    <!-- shadow slightly below the rod to lift it -->
    <path d="M60 160 C 300 120, 700 40, 1540 20" fill="none" stroke="#000" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.18" transform="translate(0,6)"/>
  </g>

  <!-- Holder for LED markers; markers will be instantiated by JS (use <use> or cloned nodes) -->
  <g id="ledLayer" transform="translate(0,40)"></g>

</svg>
